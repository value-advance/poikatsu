<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>検索結果 | ポイ活ナビ</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="ポイ活ナビのサイト内検索結果ページです。">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body data-root="../">

  <div data-include="header"></div>

  <main>
    <article class="section container article-page">

      <p class="breadcrumb">
        <a href="../index.html">ホーム</a><span class="breadcrumb__sep">›</span>
        検索結果
      </p>

      <header class="article-header">
        <h1 id="searchResultTitle">検索結果</h1>
      </header>

      <form class="site-search site-search--page" action="/pages/search" method="get" role="search">
        <input type="search" name="q" id="searchPageInput" class="site-search__input" placeholder="キーワードを入力" aria-label="サイト内検索">
        <button type="submit" class="site-search__btn" aria-label="検索する">🔍</button>
      </form>

      <p class="article-count" id="searchResultCount"></p>

      <div class="article-list" id="searchResultList"></div>

      <p class="notice-box" id="searchNoResult" hidden>
        該当する記事が見つかりませんでした。キーワードを変えて再度お試しください。
      </p>

      <nav class="article-footer-nav">
        <a href="../index.html">← トップページに戻る</a>
      </nav>

    </article>
  </main>

  <div data-include="footer"></div>

  <script src="../js/main.js"></script>
</body>
</html>
